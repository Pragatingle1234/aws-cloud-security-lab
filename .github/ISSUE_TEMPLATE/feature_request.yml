name: Feature Request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Describe the problem this feature would solve
      placeholder: "I'm trying to... but there's no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like the feature to work
      placeholder: "It would be helpful if we could..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Any other approaches you've considered
      placeholder: "Another way would be..."
    validations:
      required: false

  - type: textarea
    id: benefits
    attributes:
      label: Benefits
      description: How would this benefit users?
      placeholder: |
        - Would save time for users who...
        - Would improve learning experience by...
    validations:
      required: false

  - type: checkboxes
    id: type
    attributes:
      label: Feature Type
      options:
        - label: New documentation
        - label: New automation script
        - label: New policy template
        - label: New assessment question
        - label: Infrastructure improvement
        - label: Other

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information
    validations:
      required: false
