version: 2
updates:
  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "00:00"
    open-pull-requests-limit: 5
    reviewers:
      - "Pragatingle1234"
    assignees:
      - "Pragatingle1234"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore: "
      include: "scope"
    pull-request-branch-name:
      separator: "/"
